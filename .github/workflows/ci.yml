name: CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build and deployment-script tests
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      ASTRO_TELEMETRY_DISABLED: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Install frozen dependencies
        run: bun install --frozen-lockfile

      - name: Validate operations scripts
        run: |
          bash -n ops/bootstrap-remote.sh
          bash -n ops/bootstrap-server.sh
          bash -n ops/release.sh
          bash -n ops/test-release.sh
          bash ops/test-release.sh

      - name: Build production site
        run: bun run build

      - name: Validate production output
        run: |
          test -s dist/index.html
          test -s dist/sitemap-index.xml
          grep -Rqs 'https://siyuanxue.com' dist
