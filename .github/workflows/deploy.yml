name: Deploy production

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      operation:
        description: Deploy main or roll back to a retained release
        type: choice
        options:
          - deploy
          - rollback
        default: deploy
        required: true
      rollback_sha:
        description: Full 40-character commit SHA; required for rollback
        type: string
        required: false

permissions:
  contents: read

concurrency:
  group: production
  cancel-in-progress: false

env:
  ASTRO_TELEMETRY_DISABLED: "1"

jobs:
  deploy:
    name: Build and deploy
    if: github.event_name == 'push' || inputs.operation == 'deploy'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    environment: production
    env:
      DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ vars.DEPLOY_PORT }}
      DEPLOY_USER: ${{ vars.DEPLOY_USER }}
      DEPLOY_ROOT: ${{ vars.DEPLOY_ROOT }}
      DEPLOY_ORIGIN: ${{ vars.DEPLOY_ORIGIN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Validate production configuration
        run: |
          [[ "$DEPLOY_HOST" =~ ^[A-Za-z0-9.-]+$ ]]
          [[ "$DEPLOY_PORT" =~ ^[0-9]{1,5}$ ]]
          (( DEPLOY_PORT >= 1 && DEPLOY_PORT <= 65535 ))
          [[ "$DEPLOY_USER" =~ ^[a-z_][a-z0-9_-]*$ ]]
          [[ "$DEPLOY_ROOT" == /var/www/siyuanxue.com ]]
          [[ "$DEPLOY_ORIGIN" == http://82.156.77.131 ]]

      - name: Install frozen dependencies
        run: bun install --frozen-lockfile

      - name: Test deployment scripts
        run: |
          bash -n ops/bootstrap-remote.sh
          bash -n ops/bootstrap-server.sh
          bash -n ops/release.sh
          bash -n ops/test-release.sh
          bash ops/test-release.sh

      - name: Build production site
        run: bun run build

      - name: Package release
        run: |
          test -s dist/index.html
          printf '%s' "$GITHUB_SHA" > dist/__health
          archive_name="site-${GITHUB_SHA}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}.tar.gz"
          tar -czf "$archive_name" -C dist .
          sha256sum "$archive_name" > "$archive_name.sha256"
          printf 'ARCHIVE_NAME=%s\n' "$archive_name" >> "$GITHUB_ENV"

      - name: Configure strict SSH authentication
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          test -n "$DEPLOY_SSH_KEY"
          test -n "$DEPLOY_KNOWN_HOSTS"
          install -d -m 0700 "$RUNNER_TEMP/ssh"
          printf '%s\n' "$DEPLOY_SSH_KEY" > "$RUNNER_TEMP/ssh/deploy_key"
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > "$RUNNER_TEMP/ssh/known_hosts"
          chmod 0600 "$RUNNER_TEMP/ssh/deploy_key" "$RUNNER_TEMP/ssh/known_hosts"
          ssh-keygen -y -f "$RUNNER_TEMP/ssh/deploy_key" >/dev/null

      - name: Upload release archive
        run: |
          scp \
            -i "$RUNNER_TEMP/ssh/deploy_key" \
            -P "$DEPLOY_PORT" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="$RUNNER_TEMP/ssh/known_hosts" \
            "$ARCHIVE_NAME" "$ARCHIVE_NAME.sha256" \
            "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_ROOT/incoming/"

      - name: Activate release
        id: activate
        run: |
          ssh \
            -i "$RUNNER_TEMP/ssh/deploy_key" \
            -p "$DEPLOY_PORT" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="$RUNNER_TEMP/ssh/known_hosts" \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            /usr/local/bin/siyuanxue-release activate \
            "$DEPLOY_ROOT" "$GITHUB_SHA" "$ARCHIVE_NAME" \
            http://127.0.0.1/__health

      - name: Verify release from the public internet
        run: |
          response=''
          for attempt in 1 2 3 4 5; do
            if response=$(curl --fail --silent --show-error --max-time 10 \
              "$DEPLOY_ORIGIN/__health") && [[ "$response" == "$GITHUB_SHA" ]]; then
              curl --fail --silent --show-error --max-time 10 "$DEPLOY_ORIGIN/" >/dev/null
              exit 0
            fi
            sleep 2
          done
          printf 'Public health check failed: expected %s, got %s\n' \
            "$GITHUB_SHA" "${response:-<no response>}" >&2
          exit 1

      - name: Restore previous release after failed public check
        if: failure() && steps.activate.outcome == 'success'
        run: |
          ssh \
            -i "$RUNNER_TEMP/ssh/deploy_key" \
            -p "$DEPLOY_PORT" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="$RUNNER_TEMP/ssh/known_hosts" \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            /usr/local/bin/siyuanxue-release restore-previous \
            "$DEPLOY_ROOT" "$GITHUB_SHA" http://127.0.0.1/__health

      - name: Finalize successful release
        run: |
          ssh \
            -i "$RUNNER_TEMP/ssh/deploy_key" \
            -p "$DEPLOY_PORT" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="$RUNNER_TEMP/ssh/known_hosts" \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            /usr/local/bin/siyuanxue-release finalize \
            "$DEPLOY_ROOT" "$GITHUB_SHA" 5

      - name: Remove temporary SSH material
        if: always()
        run: rm -f "$RUNNER_TEMP/ssh/deploy_key" "$RUNNER_TEMP/ssh/known_hosts"

  rollback:
    name: Roll back production
    if: github.event_name == 'workflow_dispatch' && inputs.operation == 'rollback'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    environment: production
    env:
      DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ vars.DEPLOY_PORT }}
      DEPLOY_USER: ${{ vars.DEPLOY_USER }}
      DEPLOY_ROOT: ${{ vars.DEPLOY_ROOT }}
      DEPLOY_ORIGIN: ${{ vars.DEPLOY_ORIGIN }}
      ROLLBACK_SHA: ${{ inputs.rollback_sha }}

    steps:
      - name: Validate rollback request
        run: |
          [[ "$DEPLOY_HOST" =~ ^[A-Za-z0-9.-]+$ ]]
          [[ "$DEPLOY_PORT" =~ ^[0-9]{1,5}$ ]]
          (( DEPLOY_PORT >= 1 && DEPLOY_PORT <= 65535 ))
          [[ "$DEPLOY_USER" =~ ^[a-z_][a-z0-9_-]*$ ]]
          [[ "$DEPLOY_ROOT" == /var/www/siyuanxue.com ]]
          [[ "$DEPLOY_ORIGIN" == http://82.156.77.131 ]]
          [[ "$ROLLBACK_SHA" =~ ^[0-9a-f]{40}$ ]]

      - name: Configure strict SSH authentication
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          test -n "$DEPLOY_SSH_KEY"
          test -n "$DEPLOY_KNOWN_HOSTS"
          install -d -m 0700 "$RUNNER_TEMP/ssh"
          printf '%s\n' "$DEPLOY_SSH_KEY" > "$RUNNER_TEMP/ssh/deploy_key"
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > "$RUNNER_TEMP/ssh/known_hosts"
          chmod 0600 "$RUNNER_TEMP/ssh/deploy_key" "$RUNNER_TEMP/ssh/known_hosts"
          ssh-keygen -y -f "$RUNNER_TEMP/ssh/deploy_key" >/dev/null

      - name: Activate retained release
        id: activate
        run: |
          ssh \
            -i "$RUNNER_TEMP/ssh/deploy_key" \
            -p "$DEPLOY_PORT" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="$RUNNER_TEMP/ssh/known_hosts" \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            /usr/local/bin/siyuanxue-release rollback \
            "$DEPLOY_ROOT" "$ROLLBACK_SHA" http://127.0.0.1/__health

      - name: Verify rollback from the public internet
        run: |
          response=''
          for attempt in 1 2 3 4 5; do
            if response=$(curl --fail --silent --show-error --max-time 10 \
              "$DEPLOY_ORIGIN/__health") && [[ "$response" == "$ROLLBACK_SHA" ]]; then
              curl --fail --silent --show-error --max-time 10 "$DEPLOY_ORIGIN/" >/dev/null
              exit 0
            fi
            sleep 2
          done
          printf 'Public rollback check failed: expected %s, got %s\n' \
            "$ROLLBACK_SHA" "${response:-<no response>}" >&2
          exit 1

      - name: Undo rollback after failed public check
        if: failure() && steps.activate.outcome == 'success'
        run: |
          ssh \
            -i "$RUNNER_TEMP/ssh/deploy_key" \
            -p "$DEPLOY_PORT" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="$RUNNER_TEMP/ssh/known_hosts" \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            /usr/local/bin/siyuanxue-release restore-previous \
            "$DEPLOY_ROOT" "$ROLLBACK_SHA" http://127.0.0.1/__health

      - name: Finalize rollback
        run: |
          ssh \
            -i "$RUNNER_TEMP/ssh/deploy_key" \
            -p "$DEPLOY_PORT" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="$RUNNER_TEMP/ssh/known_hosts" \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            /usr/local/bin/siyuanxue-release finalize \
            "$DEPLOY_ROOT" "$ROLLBACK_SHA" 5

      - name: Remove temporary SSH material
        if: always()
        run: rm -f "$RUNNER_TEMP/ssh/deploy_key" "$RUNNER_TEMP/ssh/known_hosts"
